apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helm.fullname" . }}
  labels:
    {{- include "helm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "helm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "helm.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default "latest"}}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: WP_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "helm.fullname" . }}
                  key: wp-env
            - name: WP_HOME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "helm.fullname" . }}
                  key: wp-home
            - name: WP_SITEURL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "helm.fullname" . }}
                  key: wp-siteurl
            - name: APACHE_VHOST_DIR
              valueFrom:
                configMapKeyRef:
                  name: {{ include "helm.fullname" . }}
                  key: apache-vhost-dir
            {{- if .Values.valkey.enabled }}
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "helm.fullname" . }}
                  key: valkey-host
            {{- if .Values.valkey.token }}
            - name: REDIS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "helm.fullname" . }}
                  key: valkey-token
            {{- end }}
            {{- end }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "helm.fullname" . }}
                  key: database-url
            - name: MAIL_MAILER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "helm.fullname" . }}
                  key: mail-mailer
            {{- if eq .Values.mail.mailer "smtps" }}
            {{- if .Values.mail.host }}
            - name: MAIL_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "helm.fullname" . }}
                  key: mail-host
            {{- end }}
            {{- if .Values.mail.port }}
            - name: MAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "helm.fullname" . }}
                  key: mail-port
            {{- end }}
            {{- if .Values.mail.encryption }}
            - name: MAIL_ENCRYPTION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "helm.fullname" . }}
                  key: mail-encryption
            {{- end }}
            {{- if .Values.mail.fromAddress }}
            - name: MAIL_FROM_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "helm.fullname" . }}
                  key: mail-from-address
            {{- end }}
            {{- if .Values.mail.fromName }}
            - name: MAIL_FROM_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "helm.fullname" . }}
                  key: mail-from-name
            {{- end }}
            {{- if .Values.mail.username }}
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "helm.fullname" . }}
                  key: mail-username
            {{- end }}
            {{- if .Values.mail.password }}
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "helm.fullname" . }}
                  key: mail-password
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.uploads.enabled }}
            - name: uploads-volume
              mountPath: {{ .Values.uploads.containerPath }}
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if .Values.uploads.enabled }}
        - name: uploads-volume
          hostPath:
            path: {{ .Values.uploads.hostPath }}
            type: DirectoryOrCreate
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
